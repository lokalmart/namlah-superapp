<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Namlah Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f6f3ea;
        color: #142018;
        font-family: Arial, Helvetica, sans-serif;
      }
      main {
        width: min(420px, calc(100% - 32px));
        padding: 24px;
        border: 1px solid rgba(20, 32, 24, 0.14);
        border-radius: 8px;
        background: #fffdf7;
      }
      p {
        color: #627064;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Namlah sedang offline.</h1>
      <p>Shell app akan kembali saat koneksi tersedia.</p>
    </main>
